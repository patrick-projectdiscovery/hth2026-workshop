id: spaceballs-env-exposure

info:
  name: Spaceballs .env File Exposure
  author: hth2026-workshop
  severity: high
  description: |
    The staging instance serves the .env file containing environment
    variables with secrets, database URLs, and API credentials.
  tags: exposure,config,spaceballs

http:
  - method: GET
    path:
      - "{{BaseURL}}/.env"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "DB_PASSWORD"
          - "JWT_SECRET"
          - "API_KEY"
        condition: or

      - type: word
        words:
          - "<html"
          - "<HTML"
        negative: true
