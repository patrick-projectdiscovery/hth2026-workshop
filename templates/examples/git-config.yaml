id: spaceballs-git-config

info:
  name: Spaceballs Git Config Exposure
  author: hth2026-workshop
  severity: medium
  description: |
    The staging instance exposes the .git/config file, revealing
    repository information and potentially internal URLs.
  tags: exposure,git,spaceballs

http:
  - method: GET
    path:
      - "{{BaseURL}}/.git/config"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "[core]"
          - "[remote"
        condition: or
