id: spaceballs-debug-config

info:
  name: Spaceballs Debug Config Exposure
  author: hth2026-workshop
  severity: critical
  description: |
    The Spaceballs Galactic Defense Corp staging instance exposes a debug
    configuration endpoint that leaks database credentials, JWT signing
    secrets, and API keys.
  tags: exposure,config,spaceballs

http:
  - method: GET
    path:
      - "{{BaseURL}}/debug/config"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "database_password"
          - "jwt_secret"
          - "secret_key"
        condition: or

    extractors:
      - type: regex
        name: jwt-secret
        group: 1
        regex:
          - '"jwt_secret":\s*"([^"]+)"'

      - type: regex
        name: db-password
        group: 1
        regex:
          - '"database_password":\s*"([^"]+)"'
